<!DOCTYPE html>
<html>
<head><title>Layout Grid</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: #111; color: #eee; font-family: monospace; font-size: 12px; }
.viewer { position: relative; display: inline-block; margin: 20px; }
.viewer img { display: block; }
.grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.grid-line-h, .grid-line-v { position: absolute; background: rgba(255,0,0,0.3); }
.grid-line-h { height: 1px; width: 100%; }
.grid-line-v { width: 1px; height: 100%; }
.grid-label { position: absolute; color: red; font-size: 10px; background: rgba(0,0,0,0.7); padding: 1px 3px; }
h2 { text-align: center; margin: 10px; color: #c9a84c; }
#coords { position: fixed; top: 5px; left: 5px; background: rgba(0,0,0,0.9); padding: 8px 12px; z-index: 999; font-size: 14px; border: 1px solid #c9a84c; }
</style>
</head>
<body>
<div id="coords">Hover over image</div>

<h2>ANTONIA (2600 x 2900)</h2>
<div class="viewer" id="antonia-viewer">
  <img src="/antonia-layout.png" id="antonia-img" />
</div>

<h2>ARANYA (4100 x 2900)</h2>
<div class="viewer" id="aranya-viewer">
  <img src="/aranya-layout.png" id="aranya-img" />
</div>

<script>
function addGrid(viewerEl, imgEl) {
  const overlay = document.createElement('div');
  overlay.className = 'grid-overlay';
  for (let p = 10; p < 100; p += 10) {
    const h = document.createElement('div');
    h.className = 'grid-line-h';
    h.style.top = p + '%';
    overlay.appendChild(h);
    const hl = document.createElement('div');
    hl.className = 'grid-label';
    hl.style.top = p + '%';
    hl.style.left = '0';
    hl.textContent = p + '%';
    overlay.appendChild(hl);

    const v = document.createElement('div');
    v.className = 'grid-line-v';
    v.style.left = p + '%';
    overlay.appendChild(v);
    const vl = document.createElement('div');
    vl.className = 'grid-label';
    vl.style.left = p + '%';
    vl.style.top = '0';
    vl.textContent = p + '%';
    overlay.appendChild(vl);
  }
  viewerEl.appendChild(overlay);

  viewerEl.addEventListener('mousemove', (e) => {
    const rect = imgEl.getBoundingClientRect();
    const rx = e.clientX - rect.left;
    const ry = e.clientY - rect.top;
    const px = (rx / rect.width * 100).toFixed(1);
    const py = (ry / rect.height * 100).toFixed(1);
    document.getElementById('coords').textContent =
      `${viewerEl.id.replace('-viewer','').toUpperCase()} — x: ${px}%, y: ${py}%`;
  });
}

window.addEventListener('load', () => {
  addGrid(document.getElementById('antonia-viewer'), document.getElementById('antonia-img'));
  addGrid(document.getElementById('aranya-viewer'), document.getElementById('aranya-img'));
});
</script>
</body>
</html>
